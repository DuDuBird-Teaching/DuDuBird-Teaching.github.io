<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="иҝ·е®«жёёжҲҸ - жҢ‘жҲҳж–№еҗ‘ж„ҹдёҺи®°еҝҶеҠӣпјҢжүҫеҲ°йҖҡеҫҖз»ҲзӮ№зҡ„и·Ҝеҫ„гҖӮеҳҹеҳҹйёҹж•ҷеӯҰжҖқз»ҙи®ӯз»ғзі»еҲ—гҖӮ">
    <title>иҝ·е®«жҺўйҷ© В· жҖқз»ҙжҢ‘жҲҳ | еҳҹеҳҹйёҹж•ҷеӯҰ</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background: #f5f7f2;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            padding: 1.5rem 1.2rem 2rem;
            transition: all 0.2s ease;
            border: 1px solid #e9efdf;
        }

        .game-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .game-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b7a62, #4f9da6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0 0 0.25rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .sub {
            color: #5c7f72;
            font-size: 0.85rem;
            background: #f0f4ea;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }

        /* дҝЎжҒҜж Ҹ */
        .info-panel {
            background: #fefcf0;
            border-radius: 2rem;
            padding: 0.7rem 1.2rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #e2ebda;
        }

        .stats {
            display: flex;
            gap: 1rem;
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 3rem;
            align-items: baseline;
        }

        .stats span:first-child {
            color: #4c6a63;
            font-size: 0.85rem;
        }

        .stats .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2b7a62;
            line-height: 1;
            margin-left: 6px;
        }

        button {
            background: #e6ede2;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2b7a62;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
        }

        button:hover {
            background: #d9e4d0;
            transform: scale(0.97);
        }

        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* canvas иҝ·е®«еҢәеҹҹ */
        .canvas-wrapper {
            display: flex;
            justify-content: center;
            margin: 0.5rem 0 0.8rem;
        }

        canvas {
            background-color: #d9e2ce;
            border-radius: 1.8rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* иҷҡжӢҹж–№еҗ‘й”® (з§»еҠЁз«ҜеҸӢеҘҪ) */
        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 0.8rem;
            gap: 8px;
        }

        .dpad-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .dpad-btn {
            background: #eef3e9;
            width: 60px;
            padding: 10px 0;
            border-radius: 3rem;
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #d4e0cf;
            color: #2b7a62;
        }

        .dpad-btn:active {
            transform: scale(0.94);
            background: #dfe8d7;
        }

        .win-message {
            text-align: center;
            margin-top: 0.8rem;
            background: #e2f0e2;
            border-radius: 3rem;
            padding: 0.5rem;
            font-weight: 500;
            color: #2b7a62;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .game-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #8aa79f;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f0f4ea;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            color: #2b7a62;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            background: #e3ecd9;
        }

        @media (max-width: 550px) {
            .game-container {
                padding: 1rem;
            }
            .stats .value {
                font-size: 1.2rem;
            }
            .dpad-btn {
                width: 50px;
                font-size: 1.3rem;
                padding: 8px 0;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>
            <span>рҹ—әпёҸ</span> иҝ·е®«жҺўйҷ©
        </h1>
        <div class="sub">еҜ»жүҫеҮәеҸЈ В· жҢ‘жҲҳж–№еҗ‘ж„ҹ</div>
    </div>

    <div class="info-panel">
        <div class="stats">
            <span>рҹҡ¶ жӯҘж•°</span>
            <span class="value" id="stepCount">0</span>
        </div>
        <div class="action-group">
            <button id="newMazeBtn">вңЁ ж–°иҝ·е®«</button>
            <button id="resetBtn">рҹ”„ йҮҚзҪ®</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="mazeCanvas" width="520" height="520" style="width:100%; height:auto; max-width:520px; aspect-ratio:1/1"></canvas>
    </div>

    <!-- з§»еҠЁз«ҜиҷҡжӢҹж–№еҗ‘й”® -->
    <div class="dpad">
        <div class="dpad-row">
            <div class="dpad-btn" data-dir="up">в–І</div>
        </div>
        <div class="dpad-row">
            <div class="dpad-btn" data-dir="left">в—Җ</div>
            <div class="dpad-btn" data-dir="down">в–ј</div>
            <div class="dpad-btn" data-dir="right">в–¶</div>
        </div>
    </div>

    <div id="winMessage" class="win-message" style="display: none;"></div>

    <div class="game-footer">
        <a href="javascript:void(0)" class="back-link" onclick="history.back()">рҹҺ® иҝ”еӣһжёёжҲҸеҲ—иЎЁ</a>
        <span style="margin:0 6px">В·</span>
        <span>й”®зӣҳж–№еҗ‘й”® / еұҸе№•жҢүй’® | жҠөиҫҫвӯҗиғңеҲ©</span>
    </div>
</div>

<script>
    (function(){
        // ---------- иҝ·е®«й…ҚзҪ® ----------
        const SIZE = 21;          // еҘҮж•°пјҢдҝқиҜҒиҝ·е®«иҫ№жЎҶе’ҢеҶ…йғЁиҝһйҖҡ (21x21)
        const CELL_SIZE = 520 / SIZE;  // ~24.76px дҪҶcanvasеӣәе®ҡ520пјҢзӣҙжҺҘи®Ўз®—з»ҳеҲ¶
        let maze = [];            // дәҢз»ҙж•°з»„ true=еўҷ false=и·Ҝ
        let player = { x: 1, y: 1 };    // иө·зӮ№ (1,1)
        let exit = { x: SIZE-2, y: SIZE-2 }; // з»ҲзӮ№ (19,19)
        let steps = 0;
        let gameWin = false;
        
        // DOM е…ғзҙ 
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const stepSpan = document.getElementById('stepCount');
        const winMessageDiv = document.getElementById('winMessage');
        const newMazeBtn = document.getElementById('newMazeBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // и°ғж•ҙcanvasе®һйҷ…еғҸзҙ е°әеҜё (дҝқиҜҒжё…жҷ°)
        canvas.width = 520;
        canvas.height = 520;
        
        // ---------- иҝ·е®«з”ҹжҲҗз®—жі• (йҖ’еҪ’еӣһжәҜ / иҝӯд»ЈDFS) ----------
        function initMaze() {
            // еҲӣе»әе…Ёеўҷиҝ·е®« (true = еўҷ)
            let mazeGrid = Array(SIZE).fill().map(() => Array(SIZE).fill(true));
            // е°ҶеҘҮж•°иЎҢеҲ—жү“йҖҡдёәжҪңеңЁи·Ҝеҫ„ (дҪҶеҲқе§Ӣе…ЁйғЁеўҷпјҢд№ӢеҗҺжҢ–и·Ҝ)
            // иө·зӮ№(1,1)и®ҫзҪ®дёәи·Ҝ
            mazeGrid[1][1] = false;
            
            // еӯҳеӮЁеўҷеЈҒеқҗж ҮеҲ—иЎЁ (з”ЁдәҺPrimйЈҺж ј? дёәдәҶз®ҖеҚ•дјҳйӣ…пјҢдҪҝз”ЁйҖ’еҪ’еӣһжәҜ: йҖүдёҖдёӘиө·зӮ№пјҢйҡҸжңәжү“д№ұйӮ»еұ…)
            // дҪҝз”Ёж Ҳе®һзҺ°ж·ұеәҰдјҳе…Ҳз”ҹжҲҗ (з»Ҹе…ёж–№жі•)
            const stack = [{ x: 1, y: 1 }];
            while (stack.length > 0) {
                const current = stack[stack.length - 1];
                // иҺ·еҸ–жңӘи®ҝй—®зҡ„йӮ»еұ… (и·қзҰ»дёә2зҡ„ж јеӯҗпјҢдё”жңӘиў«жҢ–ејҖ)
                const neighbors = [];
                const dirs = [
                    { dx: -2, dy: 0, wallX: -1, wallY: 0 }, // дёҠ
                    { dx: 2, dy: 0, wallX: 1, wallY: 0 },   // дёӢ
                    { dx: 0, dy: -2, wallX: 0, wallY: -1 }, // е·Ұ
                    { dx: 0, dy: 2, wallX: 0, wallY: 1 }    // еҸі
                ];
                for (let dir of dirs) {
                    const nx = current.x + dir.dx;
                    const ny = current.y + dir.dy;
                    if (nx > 0 && nx < SIZE-1 && ny > 0 && ny < SIZE-1 && mazeGrid[nx][ny] === true) {
                        neighbors.push({ nx, ny, wallX: current.x + dir.wallX, wallY: current.y + dir.wallY });
                    }
                }
                if (neighbors.length > 0) {
                    // йҡҸжңәйҖүдёҖдёӘйӮ»еұ…
                    const rand = Math.floor(Math.random() * neighbors.length);
                    const next = neighbors[rand];
                    // жү“йҖҡеҪ“еүҚж јеҲ°йӮ»еұ…зҡ„еўҷ
                    mazeGrid[next.nx][next.ny] = false;
                    mazeGrid[next.wallX][next.wallY] = false;
                    stack.push({ x: next.nx, y: next.ny });
                } else {
                    stack.pop();
                }
            }
            // зЎ®дҝқз»ҲзӮ№жҳҜи·Ҝ (з»ҲзӮ№еқҗж Үе·Із»ҸжҳҜеҘҮж•°еқҗж ҮпјҢжҢүзҗҶиҜҙе·ІиҝһйҖҡпјҢдҪҶйўқеӨ–дҝқиҜҒ)
            mazeGrid[exit.x][exit.y] = false;
            // еҸҜйҖү: зЎ®дҝқе…ҘеҸЈеҮәеҸЈйҷ„иҝ‘ж— жӯ»й”ҒbugпјҢж— йңҖйўқеӨ–ж“ҚдҪң
            return mazeGrid;
        }
        
        // йҮҚж–°з”ҹжҲҗе…Ёж–°иҝ·е®«
        function generateNewMaze() {
            maze = initMaze();
            // йҮҚзҪ®зҺ©е®¶е’ҢиғңеҲ©зҠ¶жҖҒ
            player = { x: 1, y: 1 };
            steps = 0;
            gameWin = false;
            winMessageDiv.style.display = 'none';
            updateStepsDisplay();
            drawMaze();
        }
        
        // йҮҚзҪ®еҪ“еүҚиҝ·е®« (дёҚж”№еҸҳз»“жһ„пјҢеҸӘйҮҚзҪ®зҺ©е®¶дҪҚзҪ®е’ҢжӯҘж•°)
        function resetCurrentMaze() {
            if (gameWin) {
                // еҰӮжһңиғңеҲ©пјҢйҮҚзҪ®еҗҺжё…йҷӨиғңеҲ©ж Үеҝ—
                gameWin = false;
                winMessageDiv.style.display = 'none';
            }
            player = { x: 1, y: 1 };
            steps = 0;
            updateStepsDisplay();
            drawMaze();
        }
        
        // жӯҘж•°UIжӣҙж–°
        function updateStepsDisplay() {
            stepSpan.innerText = steps;
        }
        
        // жЈҖжҹҘиғңеҲ©
        function checkVictory() {
            if (player.x === exit.x && player.y === exit.y && !gameWin) {
                gameWin = true;
                winMessageDiv.style.display = 'block';
                winMessageDiv.innerHTML = 'рҹҺү жҒӯе–ңиө°еҮәиҝ·е®«пјҒ еӨӘеҺүе®ідәҶ рҹҺү <span style="font-size:0.85rem;">вңЁ зӮ№еҮ»гҖҢж–°иҝ·е®«гҖҚз»§з»ӯжҢ‘жҲҳ вңЁ</span>';
                drawMaze(); // йҮҚз»ҳеұ•зӨәиғңеҲ©зү№ж•Ҳ
                return true;
            }
            return false;
        }
        
        // з§»еҠЁе°қиҜ•
        function tryMove(dx, dy) {
            if (gameWin) {
                // иғңеҲ©еҗҺж— жі•з§»еҠЁпјҢдҪҶеҸҜд»ҘйҮҚзҪ®жҲ–ж–°иҝ·е®«
                return false;
            }
            const newX = player.x + dx;
            const newY = player.y + dy;
            // иҫ№з•ҢжЈҖжҹҘ
            if (newX < 0 || newX >= SIZE || newY < 0 || newY >= SIZE) return false;
            // жЈҖжҹҘжҳҜеҗҰж’һеўҷ (maze[newX][newY] дёә true иЎЁзӨәеўҷ)
            if (maze[newX][newY] === true) return false;
            
            // жү§иЎҢз§»еҠЁ
            player.x = newX;
            player.y = newY;
            steps++;
            updateStepsDisplay();
            drawMaze();
            
            // иғңеҲ©еҲӨе®ҡ
            if (checkVictory()) {
                drawMaze(); // еҶҚйҮҚз»ҳдёҖж¬ЎжҳҫзӨәз»ҲзӮ№й«ҳдә®
            }
            return true;
        }
        
        // ---------- з»ҳеӣҫжЁЎеқ— (еёҰи§Ҷи§үзҫҺеҢ–) ----------
        function drawMaze() {
            if (!ctx) return;
            const cellW = canvas.width / SIZE;
            const cellH = canvas.height / SIZE;
            
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE; j++) {
                    const isWall = maze[i][j];
                    const x = j * cellW;
                    const y = i * cellW;
                    
                    if (isWall) {
                        // еўҷеЈҒпјҡж·ұз»ҝиүІеӨҚеҸӨиҙЁж„ҹ
                        ctx.fillStyle = '#5b7e64';
                        ctx.fillRect(x, y, cellW, cellH);
                        // еўһеҠ з»Ҷеҫ®зә№зҗҶ
                        ctx.fillStyle = '#4c6b55';
                        ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
                    } else {
                        // и·Ҝеҫ„пјҡжө…зұіиүІ/ж·ЎиҚүиүІ
                        ctx.fillStyle = '#fdf9ed';
                        ctx.fillRect(x, y, cellW, cellH);
                        ctx.fillStyle = '#f7f3e2';
                        ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
                    }
                }
            }
            
            // з»ҳеҲ¶з»ҲзӮ№ (вӯҗ йҮ‘иүІжҳҹжҳҹжҲ–иҖ…ж——еёң)
            const exitX = exit.y * cellW;
            const exitY = exit.x * cellW;
            ctx.save();
            // з»ҲзӮ№ж Үи®°: дёҖдёӘйҶ’зӣ®зҡ„зәў/йҮ‘иүІжҳҹжҳҹ
            ctx.shadowBlur = 0;
            ctx.beginPath();
            // з»ҳеҲ¶еҸ‘е…үеңҶеә•
            ctx.fillStyle = '#f3b33d';
            ctx.arc(exitX + cellW/2, exitY + cellH/2, cellW * 0.32, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#e58e1e';
            ctx.arc(exitX + cellW/2, exitY + cellH/2, cellW * 0.22, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#ffcd7e';
            ctx.font = `bold ${cellW * 0.45}px system-ui`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('вӯҗ', exitX + cellW/2, exitY + cellH/2);
            ctx.restore();
            
            // з»ҳеҲ¶зҺ©е®¶ (и“қиүІеңҶи§’е°ҸзӢј/жҲ–иҖ…е°ҸжҺўйҷ©е®¶)
            const playerX = player.y * cellW;
            const playerY = player.x * cellW;
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.fillStyle = '#3b8c7e';
            ctx.arc(playerX + cellW/2, playerY + cellH/2, cellW * 0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#f0f7f0';
            ctx.beginPath();
            ctx.arc(playerX + cellW/2 - 2, playerY + cellH/2 - 2, cellW * 0.08, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#2b5f4f';
            ctx.beginPath();
            ctx.arc(playerX + cellW/2 + 2, playerY + cellH/2 - 2, cellW * 0.08, 0, Math.PI*2);
            ctx.fill();
            // еҫ®з¬‘
            ctx.beginPath();
            ctx.arc(playerX + cellW/2, playerY + cellH/2 + 2, cellW*0.12, 0.05, Math.PI - 0.05);
            ctx.strokeStyle = '#f9e0a0';
            ctx.lineWidth = cellW * 0.07;
            ctx.stroke();
            ctx.restore();
            
            // йўқеӨ–з»ҳеҲ¶иө·зӮ№жҢҮзӨә (е°Ҹз»ҝеҸ¶ж Үи®°)
            const startX = 1 * cellW;
            const startY = 1 * cellW;
            ctx.fillStyle = '#9bc48e';
            ctx.font = `${cellW * 0.4}px system-ui`;
            ctx.fillText('рҹҢұ', startX + cellW*0.25, startY + cellW*0.75);
            
            // еҰӮжһңиғңеҲ©пјҢеңЁз”»йқўдёҠж–№еҠ е…үжҷ•
            if (gameWin) {
                ctx.save();
                ctx.globalAlpha = 0.4;
                ctx.fillStyle = '#f9eeb0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
        }
        
        // ---------- й”®зӣҳжҺ§еҲ¶ ----------
        function handleKeydown(e) {
            const key = e.key;
            let dx = 0, dy = 0;
            if (key === 'ArrowUp') { dx = -1; dy = 0; }
            else if (key === 'ArrowDown') { dx = 1; dy = 0; }
            else if (key === 'ArrowLeft') { dx = 0; dy = -1; }
            else if (key === 'ArrowRight') { dx = 0; dy = 1; }
            else return;
            
            e.preventDefault();
            tryMove(dx, dy);
        }
        
        // з§»еҠЁз«Ҝж–№еҗ‘жҢүй’®з»‘е®ҡ
        function bindDirectionButtons() {
            const btns = document.querySelectorAll('.dpad-btn');
            btns.forEach(btn => {
                btn.removeEventListener('click', directionHandler);
                btn.addEventListener('click', directionHandler);
            });
        }
        
        function directionHandler(e) {
            const dir = this.getAttribute('data-dir');
            if (dir === 'up') tryMove(-1, 0);
            else if (dir === 'down') tryMove(1, 0);
            else if (dir === 'left') tryMove(0, -1);
            else if (dir === 'right') tryMove(0, 1);
        }
        
        // ---------- ж–°иҝ·е®« & йҮҚзҪ®дәӢд»¶ ----------
        function newMazeAction() {
            generateNewMaze();
        }
        
        function resetAction() {
            if (gameWin) {
                // иғңеҲ©еҗҺйҮҚзҪ®дҫқз„¶жңүж•Ҳ
                resetCurrentMaze();
            } else {
                resetCurrentMaze();
            }
        }
        
        // ---------- е…ҘеҸЈеҲқе§ӢеҢ– ----------
        function init() {
            // з”ҹжҲҗеҲқе§Ӣиҝ·е®«
            maze = initMaze();
            player = { x: 1, y: 1 };
            steps = 0;
            gameWin = false;
            updateStepsDisplay();
            drawMaze();
            winMessageDiv.style.display = 'none';
            
            // дәӢд»¶з»‘е®ҡ
            window.addEventListener('keydown', handleKeydown);
            newMazeBtn.addEventListener('click', newMazeAction);
            resetBtn.addEventListener('click', resetAction);
            bindDirectionButtons();
        }
        
        // еҸҜйҖүпјҡзЎ®дҝқз§»еҠЁз«Ҝи§Ұж‘ёcanvasдёҚдјҡиҜҜи§ҰеҸ‘йЎөйқўж»ҡеҠЁ
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
        });
        
        init();
    })();
</script>
</body>
</html>
