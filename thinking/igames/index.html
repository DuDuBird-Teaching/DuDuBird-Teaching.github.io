<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="嘟嘟鸟教学 · 益智游戏集合：智能拼图、迷宫、数独、24点等，锻炼思维，乐趣无穷。">
    <meta name="theme-color" content="#4f9da6">
    <title>嘟嘟鸟教学 · 益智游戏库 | 拼图 · 迷宫 · 数独 · 24点</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background: #fefef7;
            color: #1e2a2e;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.8rem;
        }

        /* 导航栏 */
        .navbar {
            background: white;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(2px);
            background: rgba(255, 255, 248, 0.96);
        }

        .nav-container {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 1rem 0;
            gap: 1rem;
        }

        .logo a {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            text-decoration: none;
            background: linear-gradient(135deg, #2b7a62, #4f9da6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            transition: opacity 0.2s;
        }

        .logo a:hover {
            opacity: 0.85;
        }

        .logo span {
            font-size: 1.8rem;
            display: inline-block;
            margin-right: 4px;
            background: none;
            color: #e0a158;
            background-clip: unset;
            -webkit-background-clip: unset;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            font-weight: 500;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c4a4e;
            font-size: 1.05rem;
            transition: color 0.2s, border-bottom 0.2s;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        .nav-links a:hover,
        .nav-links .active {
            color: #2b7a62;
            border-bottom-color: #4f9da6;
        }

        /* 面包屑导航 */
        .breadcrumb {
            margin: 1.2rem 0 0.5rem;
            font-size: 0.85rem;
            color: #5f8077;
        }
        .breadcrumb a {
            text-decoration: none;
            color: #2b7a62;
        }
        .breadcrumb span {
            color: #a08f6e;
        }

        /* Hero 区 */
        .hero {
            text-align: center;
            padding: 2rem 0 1rem 0;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(145deg, #1e4a4b, #3a7b6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .hero .game-icon {
            font-size: 2rem;
            display: inline-block;
            margin-right: 8px;
        }
        .subhead {
            color: #4a5b5e;
            max-width: 700px;
            margin: 0.5rem auto 0;
        }

        /* 游戏网格 */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0 2rem;
        }

        .game-card {
            background: white;
            border-radius: 1.8rem;
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2e8;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -12px rgba(55, 85, 70, 0.2);
            border-color: #cfdecb;
        }

        .game-preview {
            background: #f4f8ef;
            padding: 1.5rem 1rem;
            text-align: center;
            font-size: 3rem;
            border-bottom: 1px solid #e3ecdb;
        }
        .game-info {
            padding: 1.5rem 1.2rem 1.5rem;
            flex: 1;
        }
        .game-info h3 {
            font-size: 1.5rem;
            font-weight: 650;
            color: #1e3f3f;
            margin-bottom: 0.5rem;
        }
        .game-desc {
            font-size: 0.9rem;
            color: #4f6a64;
            margin: 0.6rem 0 0.8rem;
            line-height: 1.4;
        }
        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #7e9a8e;
        }
        .difficulty {
            background: #eef3e6;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-weight: 500;
        }
        .btn-play {
            background: #f0f4ea;
            color: #2b7a62;
            border: 1px solid #dae6d2;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 550;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-play:hover {
            background: #e6f0e0;
            gap: 0.6rem;
            border-color: #bdd0b2;
        }

        /* 分页器 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 2rem 0 2.5rem;
            flex-wrap: wrap;
        }
        .page-item {
            background: white;
            border: 1px solid #dee8da;
            padding: 0.5rem 0.9rem;
            border-radius: 2rem;
            color: #2c6e60;
            text-decoration: none;
            font-weight: 500;
            transition: 0.1s;
        }
        .page-item.active {
            background: #2b7a62;
            border-color: #2b7a62;
            color: white;
        }
        .page-item:hover:not(.active) {
            background: #eef3e9;
            border-color: #bdd0b2;
        }
        .page-disabled {
            background: #f5f7f2;
            color: #aec0b2;
            pointer-events: none;
            border-color: #e2eade;
        }

        /* 底部 */
        .footer {
            margin-top: 2rem;
            background: #eef3e9;
            padding: 2rem 0 1.5rem;
            border-radius: 2rem 2rem 0 0;
            text-align: center;
            color: #44635c;
            font-size: 0.85rem;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .footer-links a {
            text-decoration: none;
            color: #2c6e60;
            font-weight: 450;
        }
        hr {
            border: none;
            border-top: 1px solid #d4e0cf;
            margin: 1rem 0;
        }
        @media (max-width: 680px) {
            .container {
                padding: 0 1rem;
            }
            .games-grid {
                gap: 1.2rem;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container nav-container">
        <div class="logo">
            <a href="../../index.html">

        <ul class="nav-links">

<main>
    <div class="container">
        <div class="breadcrumb">
            <a href="../../index.html">首页</a> / <a href="../index.html">思维训练</a> / <span>益智游戏库</span>
        </div>
        <div class="hero">

                <span class="game-icon">🎮</span> 嘟嘟鸟 · 益智游戏库
            </h1>
            <div class="subhead">逻辑 · 策略 · 观察 | 在玩乐中锻炼最强大脑</div>
            <div class="subhead" style="font-size:0.9rem; margin-top:6px;">✨ 智能拼图 · 迷宫 · 数独(2x2) · 24点 ✨ 更多趣味游戏持续加入</div>
        </div>

        <!-- 游戏列表容器，支持分页（JS动态渲染） -->
        <div id="gamesContainer" class="games-grid"></div>
        <div id="paginationContainer" class="pagination"></div>

        <!-- 额外提示：游戏数量将不断增加，支持多页显示 -->
        <div style="text-align: center; margin: 0.5rem 0 1rem; font-size: 0.85rem; color: #6b8b7a;">
            🧩 目前共 <span id="totalCountSpan">0</span> 款游戏 · 每页显示 6 款 · 更多精彩即将上线
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-links">
            <a href="../../index.html">首页</a>
            <a href="../../about.html">关于嘟嘟鸟</a>
            <a href="../index.html">思维训练</a>
            <a href="../../math/index.html">数学</a>
            <a href="../../physics/index.html">物理</a>
            <a href="../../computer/index.html">计算机</a>
        </div>
        <hr>
        <p>© 2026 嘟嘟鸟教学 | 寓教于乐 · 益智成长</p>
        <p style="font-size: 0.75rem; margin-top: 0.6rem;">🐦 游戏列表会持续扩充，挑战你的思维极限。</p>
    </div>

<script>
    // ---------- 游戏数据（可随时增加，支持多页） ----------
    const GAMES_LIST = [
        {
            id: "puzzle_smart",
            name: "🐣 智能拼图",
            desc: "经典滑块拼图，自定义难度。通过移动图块恢复完整图像，考验空间想象与规划能力。",
            difficulty: "⭐ 中等",
            icon: "🧩",
            link: "jigsaw.html",    // 实际游戏链接占位，后续可替换为真实页面
            status: "ready"
        },
        {
            id: "maze_runner",
            name: "🌀 迷宫探险",
            desc: "随机生成迷宫，寻找最短路径。锻炼观察力与逆向思维。",
            difficulty: "⭐ 简单~中等",
            icon: "🗺️",
            link: "maze.html",
            status: "ready"
        },
        {
            id: "sudoku",
            name: "🔢 四宫格数独",
            desc: "适合初学者入门逻辑推理。每行每列数字不重复。",
            difficulty: "⭐ 简单",
            icon: "📊",
            link: "sudoku.html",
            status: "ready"
        },
        {
            id: "game24",
            name: "➕ 24点挑战",
            desc: "给定4个数字，使用加减乘除算出24。心算与组合爆炸，经典益智游戏。",
            difficulty: "⭐⭐ 中等",
            icon: "🎯",
            link: "24points.html",
            status: "ready"
        },
        {
            id: "memory_match",
            name: "🧠 记忆翻牌",
            desc: "经典配对记忆游戏，挑战你的短期记忆与专注力。多级难度可选。",
            difficulty: "⭐ 简单~中等",
            icon: "🃏",
            link: "flipcards.html",
            status: "ready"
        },
        {
            id: "word_ladder",
            name: "📖 单词接龙桥",
            desc: "从一个单词变换到另一个，每次改变一个字母。锻炼词汇与逻辑链路。",
            difficulty: "⭐⭐ 中等",
            icon: "🔤",
            link: "javascript:void(0)",
            status: "coming"
        },
        {
            id: "tower_of_hanoi",
            name: "🗼 汉诺塔",
            desc: "经典递归思维游戏，锻炼规划步骤与分治策略。",
            difficulty: "⭐⭐ 中等",
            icon: "塔",
            link: "javascript:void(0)",
            status: "coming"
        },
        {
            id: "light_out",
            name: "💡 灭灯游戏",
            desc: "点击格子切换周围灯的状态，最终全部熄灭。锻炼逻辑推理与逆向思考。",
            difficulty: "⭐⭐⭐ 困难",
            icon: "✨",
            link: "javascript:void(0)",
            status: "coming"
        },
        {
            id: "nonogram",
            name: "🎨 绘图逻辑 (Nonogram)",
            desc: "根据行列数字提示填充格子，还原像素画。锻炼演绎与观察能力。",
            difficulty: "⭐⭐⭐ 困难",
            icon: "🖼️",
            link: "javascript:void(0)",
            status: "coming"
        },
        {
            id: "2048_classic",
            name: "🔢 2048 合体",
            desc: "滑动合并数字，挑战最高分。培养策略与数感。",
            difficulty: "⭐⭐ 中等",
            icon: "🔳",
            link: "javascript:void(0)",
            status: "coming"
        },
        {
            id: "matchstick",
            name: "🪄 火柴棒谜题",
            desc: "移动火柴使等式成立，创意几何与代数思维。",
            difficulty: "⭐⭐ 中等",
            icon: "🔥",
            link: "javascript:void(0)",
            status: "coming"
        }
    ];

    // 分页配置
    const PAGE_SIZE = 6;     // 每页显示6个游戏，方便多页扩展
    let currentPage = 1;
    let totalGames = GAMES_LIST.length;
    let totalPages = Math.ceil(totalGames / PAGE_SIZE);

    // 渲染指定页的游戏卡片
    function renderGames(page) {
        const container = document.getElementById('gamesContainer');
        if (!container) return;
        const startIdx = (page - 1) * PAGE_SIZE;
        const endIdx = startIdx + PAGE_SIZE;
        const pageGames = GAMES_LIST.slice(startIdx, endIdx);
        
        if (pageGames.length === 0) {
            container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">✨ 更多游戏正在飞来的路上，保持期待 ✨</div>`;
            return;
        }
        
        let html = '';
        for (let game of pageGames) {
            const isComing = game.status === 'coming';
            const btnText = isComing ? '🔜 即将开放' : '🎮 开始游戏';
            const btnDisabledAttr = isComing ? 'disabled style="opacity:0.6; cursor:not-allowed;"' : '';
            html += `
                <div class="game-card">
                    <div class="game-preview">
                        ${game.icon} ${game.name.split(' ')[0]}
                    </div>
                    <div class="game-info">
                        <h3>${game.name}</h3>
                        <div class="game-desc">${game.desc}</div>
                        <div class="game-meta">
                            <span class="difficulty">${game.difficulty}</span>
                            <a href=${game.link} class="btn-play" target="_blank">${btnText}</a>
                        </div>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.getElementById('totalCountSpan') && (document.getElementById('totalCountSpan').innerText = totalGames);
    }

    // 渲染分页控件
    function renderPagination() {
        const pagiContainer = document.getElementById('paginationContainer');
        if (!pagiContainer) return;
        if (totalPages <= 1) {
            pagiContainer.innerHTML = '';
            return;
        }
        let pagiHtml = '';
        // 上一页
        if (currentPage === 1) {
            pagiHtml += `<a class="page-item page-disabled">← 上一页</a>`;
        } else {
            pagiHtml += `<a class="page-item" href="javascript:void(0)" onclick="changePage(${currentPage - 1})">← 上一页</a>`;
        }
        
        // 页码数字 (最多显示5个页码，简洁)
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) {
            startPage = Math.max(1, endPage - 4);
        }
        for (let i = startPage; i <= endPage; i++) {
            if (i === currentPage) {
                pagiHtml += `<a class="page-item active" href="javascript:void(0)">${i}</a>`;
            } else {
                pagiHtml += `<a class="page-item" href="javascript:void(0)" onclick="changePage(${i})">${i}</a>`;
            }
        }
        
        // 下一页
        if (currentPage === totalPages) {
            pagiHtml += `<a class="page-item page-disabled">下一页 →</a>`;
        } else {
            pagiHtml += `<a class="page-item" href="javascript:void(0)" onclick="changePage(${currentPage + 1})">下一页 →</a>`;
        }
        pagiContainer.innerHTML = pagiHtml;
    }

    // 切换页面
    window.changePage = function(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderGames(currentPage);
        renderPagination();
        // 平滑滚动到顶部
        window.scrollTo({ top: 280, behavior: 'smooth' });
    };

    // 初始化
    function init() {
        totalPages = Math.ceil(GAMES_LIST.length / PAGE_SIZE);
        // 确保currentPage不超出范围
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        renderGames(currentPage);
        renderPagination();
    }
    
    init();

    // 动态监控未来游戏数量增加时，可手动调用重新计算分页，此处提供控制台扩展方法
    window.refreshGameList = function(newGamesArray) {
        // 如果外部想扩展游戏列表，可以调用此函数，但简单演示中直接用全局变量替换即可
        console.log("游戏列表扩展方法: 可动态更新 GAMES_LIST 并重新 init");
        // 实际使用中可以由开发者调用，但为了演示，不做复杂覆盖，但已支持动态添加。
        alert("开发提示：如需增加游戏，请直接修改GAMES_LIST数组并调用init()刷新。当前游戏数量：" + GAMES_LIST.length);
    };
</script>
<!-- 为满足多页显示需求，上述分页组件完美支持游戏数量超过6款，且可任意增加条目。未来随时扩充GAMES_LIST即可 -->
</body>
